name = "goalsmapping-app"
compatibility_date = "2024-09-23"
pages_build_output_dir = "dist"

# ─── D1 Database binding ───────────────────────────────────────────────────────
# Replace REPLACE_WITH_YOUR_DATABASE_ID after running:
#   wrangler d1 create goalsmapping-db
#
[[d1_databases]]
binding = "DB"
database_name = "goalsmapping-db"
database_id = "fe80528d-f294-47a8-a93e-f8023961bd21"

# ─── Environment variables ─────────────────────────────────────────────────────
# Set JWT_SECRET in Cloudflare Pages dashboard (NOT here — causes binding conflict):
# Pages > goalsmapping-app > Settings > Environment variables > Add variable
# Name: JWT_SECRET  |  Value: <your-random-secret>
